<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somnia - Objetivos</title>
    <link rel="icon" href="assets/favicon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="app-page">

<div class="app-layout">
    <aside id="navbar" class="sidebar"></aside>

    <main class="content-shell">
        <section class="hero-panel compact">
            <div>
                <span class="eyebrow">Objetivos</span>
                <h1>Objetivo de sueño</h1>
                <p>Definí la meta diaria que querés cumplir y mantené un seguimiento constante.</p>
            </div>
            <div class="hero-moon">🎯</div>
        </section>

        <section class="two-column">
            <article class="card form-card">
                <h2>Datos del objetivo</h2>

                <div class="form-group">
                    <label>Horas objetivo</label>
                    <input type="number" id="horasObjetivo" min="1" step="1" placeholder="Ejemplo: 8">
                </div>

                <div class="form-group">
                    <label>Descripción</label>
                    <input type="text" id="descripcionObjetivo" placeholder="Dormir al menos 8 horas diarias">
                </div>

                <div class="actions">
                    <button onclick="crearObjetivo()">Crear</button>
                    <button class="secondary" onclick="consultarObjetivo()">Consultar</button>
                    <button class="secondary" onclick="editarObjetivo()">Editar</button>
                    <button class="danger" onclick="eliminarObjetivo()">Eliminar</button>
                </div>
            </article>

            <article class="card result-card">
                <h2>Objetivo actual</h2>
                <div id="resultadoObjetivo" class="resultado">
                    <div class="empty-state">Cargando objetivo...</div>
                </div>
            </article>
        </section>
    </main>
</div>

<script src="js/config.js"></script>
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/goals.js"></script>
</body>
</html>
